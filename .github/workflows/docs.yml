name: Documentation

on:
  push:
    branches: [main, release-please--branches--main--changes--next]
    paths:
      - 'docs/**'
      - 'scripts/generate-docs.sh'
      - 'pkg/cmd/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, release-please--branches--main--changes--next]
    paths:
      - 'docs/**'
      - 'scripts/generate-docs.sh'
  workflow_dispatch:

env:
  DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

jobs:
  # Lint documentation for markdown syntax and structure
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Lint Documentation
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "latest"
          call: docs-lint --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  # Build documentation site
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Documentation
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "latest"
          call: docs-build --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  # Build and deploy to GitHub Pages (only on main/release branches)
  deploy:
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-please--branches--main')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Documentation
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "latest"
          call: docs-build --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/_book'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
