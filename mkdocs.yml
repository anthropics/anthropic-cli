site_name: Anthropic CLI Documentation
site_description: Complete documentation for the Anthropic CLI
site_author: Anthropic

nav:
  - Home: index.md
  - CLI Reference:
      - Overview: cli/index.md
      - Installation: cli/installation.md
      - Authentication: cli/authentication.md
      - Global Flags: cli/global-flags.md
      - Output Formats: cli/output-formats.md
  - Guides:
      - Quick Start: guides/quickstart.md
      - Advanced Usage: guides/advanced-usage.md
  - API: api/index.md

theme:
  name: material
  palette:
    primary: custom

extra_css:
  - stylesheets/anthropic.css

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
